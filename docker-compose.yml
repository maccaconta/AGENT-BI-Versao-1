version: "3.9"

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: agent_bi_db
      POSTGRES_USER: agent_bi_user
      POSTGRES_PASSWORD: agent_bi_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_bi_user -d agent_bi_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── MinIO (S3 local) ────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── Django API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate --settings=config.settings.development &&
             python manage.py runserver 0.0.0.0:8000 --settings=config.settings.development"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgresql://agent_bi_user:agent_bi_pass@db:5432/agent_bi_db
      REDIS_URL: redis://redis:6379/0
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─── Celery Worker ───────────────────────────────────────────────────────────
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config.celery worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgresql://agent_bi_user:agent_bi_pass@db:5432/agent_bi_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - api

  # ─── Celery Beat ─────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgresql://agent_bi_user:agent_bi_pass@db:5432/agent_bi_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  minio_data:
